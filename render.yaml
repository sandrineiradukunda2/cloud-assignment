services:
  - type: web
    name: elearning-university-app
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: elearning-university-db
          property: connectionString

databases:
  - name: elearning-university-db
    plan: free
